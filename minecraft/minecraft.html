<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTeam Minecraft</title>
    <link rel="icon" href="../MS.png" type="image/png">
    <style>
        /* Existing styles */
        body {
            margin: 0;
            padding: 0;
            background-image: url('../Website Back.jpg');
            background-size: cover;
            background-repeat: no-repeat;
            background-attachment: fixed;
            height: 100vh;
            font-family: Arial, sans-serif;
        }
        .top-right-button {
            position: fixed;
            top: 20px;
            right: 20px;
            background-color: #007BFF;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 24px;
            text-decoration: none;
            display: inline-block;
        }
        .top-right-button:hover {
            background-color: #0056b3;
        }
        .navbar {
            display: flex;
            align-items: center;
            padding: 10px;
            position: fixed;
            top: 0;
            width: 100%;
            box-sizing: border-box;
            z-index: 1000;
        }
        .navbar img {
            height: 50px;
            margin-left: 8px;
            margin-top: 15px;
        }
        .content {
            margin-top: 70px;
            padding: 20px;
            position: relative;
        }
        .divider {
            border-top: 2px solid #fff;
            margin: 5px 0;
            position: fixed; /* Make the divider fixed */
            width: 100%; /* Full width */
            top: 50%; /* Adjust the position as needed */
            z-index: 1000; /* Ensure it is above other elements */
        }
        .download-button, .download-yingguang-button {
            position: absolute;
            background-color: #007BFF;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
        }
        .download-button:hover, .download-yingguang-button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <img src="MSTeam.png" alt="MSTeam Logo">
        <a href="../ourserver/ourserver.html" class="top-right-button">加入我们的服务器</a>
    </div>
    <div class="content">
        <a href="https://msteam.us.kg/minecraft/Launcher/launcher.html" class="download-button" id="downloadButton">下载启动器</a>
        <a id="downloadYingGuang" class="download-yingguang-button">下载光影</a>
        <div class="divider" id="divider"></div>
        <!-- 这里放置你的主要内容 -->
    </div>
    <script>
        document.getElementById('downloadYingGuang').addEventListener('click', function() {
            function downloadFile(filename) {
                var element = document.createElement('a');
                element.setAttribute('href', filename);
                element.setAttribute('download', filename);
                element.style.display = 'none';
                document.body.appendChild(element);
                element.click();
                document.body.removeChild(element);
            }
            downloadFile('光影使用须知.txt');
            downloadFile('Mellow1.5.4.zip');
        });

        window.addEventListener('scroll', function() {
            var divider = document.getElementById('divider');
            var downloadButton = document.getElementById('downloadButton');
            var downloadYingGuangButton = document.getElementById('downloadYingGuang');
            var dividerPosition = divider.getBoundingClientRect().top;

            if (downloadButton.getBoundingClientRect().top >= dividerPosition) {
                downloadButton.style.display = 'none';
            } else {
                downloadButton.style.display = 'inline-block';
            }

            if (downloadYingGuangButton.getBoundingClientRect().top >= dividerPosition) {
                downloadYingGuangButton.style.display = 'none';
            } else {
                downloadYingGuangButton.style.display = 'inline-block';
            }
        });
    </script>
</body>
</html>
