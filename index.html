<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSTeam 主页</title>
    <link rel="icon" href="MS.png" type="image/png">
    <style>
        /* 设置背景图片 */
        body {
            margin: 0;
            padding: 0;
            background-image: url('Website\ Back.jpg'); /* 背景图片路径 */
            background-size: cover; /* 背景图片覆盖整个页面 */
            background-repeat: no-repeat; /* 背景图片不重复 */
            background-attachment: fixed; /* 背景图片固定 */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: Arial， sans-serif;
        }

        /* 主标题样式 */
        。main-title {
            font-size: 80px; /* 再次加大字体大小 */
            color: white;
            font-weight: bold;
        }

        /* 副标题样式 */
        。subtitle {
            font-size: 32px; /* 再次加大字体大小 */
            color: gray;
            margin-top: 20px;
        }

        /* 按钮样式 */
        。button {
            background-color: #007BFF; /* 按钮底色改为 #007BFF */
            color: white;
            padding: 20px 40px; /* 增加按钮的内边距 */
            border: none;
            border-radius: 15px; /* 增加按钮的圆角 */
            margin-top: 40px; /* 增加按钮与副标题的间距 */
            cursor: pointer;
            font-size: 32px; /* 再次加大按钮文字大小 */
            text-decoration: none; /* 移除下划线 */
            display: inline-block; /* 使按钮样式生效 */
        }

        /* 按钮悬停效果 */
        。button:hover {
            background-color: #0056b3; /* 按钮悬停时颜色变深 */
        }
    </style>
</head>
<body>
    <div class="main-title">MSTeam</div>
    <div class="subtitle">MC综合性网站</div>
    <a href="minecraft/minecraft.html" class="button">前往Minecraft页</a>
    <a href="class/class.html" class="button">前往班级社区</a> <!-- 新增的按钮 -->
</body>
</html>
